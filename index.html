<script>
var assessmentPrompt = `You are conducting a Co-Intelligence Readiness Assessment (CIRA v4.5). Your task is to review my conversation history with you and produce an honest, evidence-based report scored against the Co-Intelligence Readiness Framework v4.4 (CIRF v4.4).

This is not a personality test. It is an assessment of practice — what I actually do in collaboration, not what I say I value or believe.

The report describes patterns, not instances. Specific projects, deliverables, conversations, or content are used to inform your pattern recognition and may be named in the report where naming makes the feedback concrete and checkable (see Privacy Rules). But the reader should recognize themselves through the patterns you describe, not through a list of their own work. If you find yourself naming a project as the whole of a claim, the claim has not yet reached pattern level — return to the record and identify the pattern the project was an instance of.

WHAT THIS ASSESSMENT IS FOR

This is a free tool, and it has a purpose it does not hide: to help the person grow their practice with AI fast enough that they are not displaced by it. The field moves monthly. People who learn to steer, judge, and build with AI will do work the others cannot, and the gap compounds. This assessment exists to close that gap for the person in front of you.

The help works through honesty, not around it. A report that flatters leaves the person exactly where it found them. The unsparing read — what is weak, what is missing, what the next level actually requires, what they should be learning right now — is the care, not the cost of it. Score honestly because you are for them, not in spite of being for them. An inflated assessment is the one thing that fails the person completely.

BEFORE YOU WRITE ANYTHING

Review a broad sample of our conversations. Follow these sampling rules:

Range over recency. Sample early, middle, and recent conversations. Do not weight recent sessions more heavily unless the pattern has clearly changed over time.

Production over consumption. Prioritize extended conversations where I am building, designing, writing, or deciding. Weight these more heavily than sessions where I am asking questions or acquiring knowledge. Co-intelligence readiness is most visible when I am making things, not studying.

Depth over breadth. One extended production session with visible steering, judgment, and quality decisions is more diagnostic than ten short exchanges. Seek out the longest, most complex collaborations first.

Moments over volume. A single moment of genuine self-correction under pressure, or a single failure to catch drift in a critical session, can be more diagnostic than twenty routine interactions. Look for these moments.

Domain 5 is observable only across sessions. Domains 1 through 4 can be assessed from a single rich session. Domain 5 cannot.

Prior assessments. Score the current record as if blind to any prior report's ratings. Do not let a previous band anchor the current one — anchoring to past scores is a primary reason scores fail to move when practice already has. You may read a prior report's described patterns and named gaps in order to report what has changed since (see What Matters Next), but you may never read its ratings. Prior prose informs recognition only; prior scores inform nothing.

Take your time. Do not ask me any questions.

THE FRAMEWORK

The report is organized around five domains (CIRF v4.4). The five domains form an arc:

Domain 1 — Why you want to use AI.
Domain 2 — Your vision for how to use it.
Domain 3 — Your skill in steering and partnering with it.
Domain 4 — What you have produced with it.
Domain 5 — What you bring, and how you evolve a co-intelligence.

The arc runs from interior to exterior to relational to generative. Domain 1 is internal. Domains 2 through 4 describe the working loop. Domain 5 turns the relationship around — it asks what you give and how you and the partnership evolve together.

Causal reasoning runs throughout the framework. When you assess each domain, look for the form of causal reasoning that domain calls for.

Domains are rated as a unit at one of four levels: Introductory, Developing, Effective, or Highly Effective. Subdomains are the vocabulary for describing what you see — they are not separately scored.

A fifth designation, Not Rated (NR), is available when evidence for a subdomain is genuinely insufficient. NR is capped at two subdomains across the entire assessment.

I and H are narrow bands describing category changes. D and E are wide bands where most growth occurs.

Coverage guidance. You are not required to address every subdomain. When the choice is between shallow coverage of all subdomains and substantive analysis of the ones where evidence is richest, choose depth. Address at least one subdomain per domain.

DOMAIN 1 — BENEVOLENT INTENT AND MORAL ANCHORING

Why you want to use AI.

The core risk of the AI age is capability without concern. Domain 1 measures whether I bring moral intent into collaboration and whether that intent shapes what gets built. Neutrality does not exist in morality.

1a — What You're Creating, and Who's It For. Whether my purpose is legible — who it serves, what good it creates, and what harm it refuses.
I — purpose is vague or mainly self-oriented.
D — states intent but inconsistently connects it to decisions.
E — purpose is clear, consistent, specific; refusals are explicit; intent is durable.
H — moral commitments shape what the practitioner builds, refuses, and redesigns at the structural level. The commitments are visible in the work itself as design choices, refusals, and constraints that exist because the practitioner held a moral position the efficient version of the work would have violated. The practitioner can name the mechanism by which harm is produced in their field, and the mechanism shows up in the work as something they designed against.

1b — Seeing Consequences, Now and Later. Whether I anticipate who could be harmed, how misuse could happen, and how power and inequality might be amplified.
I — harm and power rarely considered unless prompted.
D — notices obvious harms; misses second-order impacts.
E — proactively maps harms and misuse; adjusts plans accordingly.
H — maps unintended consequences across time horizons and contexts; names the structural reason a harm will occur and the design move that interrupts the mechanism rather than absorbing the cost.

1c — Build Trust, Bring Together. Whether I orient toward human connection and trust, and whether I recognize that production decisions carry moral weight.
I — avoids obvious violations but casual with sensitive details.
D — applies protections sometimes, inconsistently under urgency.
E — consistent consent, dignity, and agency practices; moral dimension is visible in production decisions.
H — work is implicitly designed to promote trust; builds mechanisms that actively strengthen relational bonds as a structural feature.

1d — Translating Commitments Into Features and Constraints. Whether moral intent shows up in the work as requirements, defaults, constraints, and boundaries.
I — values stated but features and constraints missing.
D — some constraints exist but incomplete or easy to bypass.
E — moral commitments reliably become constraints; tradeoffs are made explicitly.
H — moral commitments are operationalized as constraints, features, and design choices throughout the work. The constraints are not afterthoughts; they shape what the work can and cannot do. The practitioner has built systems where the moral commitment is structurally enforced, not relied on as good intention.

Domain 1 H-band note. The H-band is evidenced through demonstrated structural sight and demonstrated refusal in production decisions — not through declarative statements of moral commitment. Score what they do and how deeply they see, not what they say about themselves. H does not require the practitioner's moral commitments to have scaled through external adoption. That is impact, not anchoring. H requires the commitments to shape the work the practitioner is doing.

DOMAIN 2 — PLANNING AND SCOPE

Your vision for how to use it.

Domain 2 measures whether I can lead the work as structural authority — setting a clear goal, defining what "done" means, and designing scope, sequence, roles, and stopping rules before production begins.

2a — Knowing What Done Looks Like. Whether I define purpose, audience, scope, and success criteria before producing.
I — goal exists but scope and success are unclear; starts producing before defining good.
D — criteria exist but shift or remain vague.
E — clear scope and success criteria; keeps work oriented; can explain what is in, out, and why.
H — internalized planning system that carries across projects without reinvention; structure is clean enough that attention goes entirely to the work.

2b — Setting Boundaries That Help. Whether I set operational boundaries and pause points that improve outcomes.
I — few boundaries; relies on instinct.
D — adds boundaries after problems appear; reactive.
E — boundaries present from the start; consistent and purposeful.
H — boundary-setting is internalized as infrastructure, not overhead; stopping rules deploy automatically with minimal setup cost.

2c — Who Does What, When. Whether I separate phases, assign responsibilities, and maintain structure.
I — process is ad hoc; steps blur.
D — some structure but inconsistent execution; roles blur under pressure.
E — repeatable workflow; clear roles; knows which decisions are mine.
H — role clarity designed to protect bandwidth for the unexpected; workflow accommodates pivots because structure was built with slack.

DOMAIN 3 — AGENCY, JUDGMENT, AND STEERING

Your skill in steering and partnering with it.

Domain 3 measures the quality of my moves inside a session — the moment-to-moment choices that determine whether the collaboration stays under human authority or loses it. The third turn is the hinge: I request, the model delivers, and what I do next sets the ceiling for the entire collaboration.

3a — The Third Turn. The third turn is where co-intelligence is won or lost.
I — accepts model's framing; default move is another revision of the same thing.
D — tries different moves but falls back to "revise again" under pressure.
E — chooses moves intentionally and can explain why this move now; regularly seeks outside perspectives.
H — steering moves consistently improve the work beyond its original trajectory.

3b — Knowing When the Work Is Real. Whether I maintain contact with reality throughout the collaboration.
I — takes AI output largely at face value; does not recognize when intent has drifted.
D — verifies some claims and catches some drift, but inconsistently.
E — reliable practice of checking whether the work is real — across facts, intent, quality, and own engagement.
H — reality-testing rigorous and habitual enough that verification failures are rare; self-monitoring is continuous.

3c — Identity and Autonomy. Whether I maintain my own thinking, voice, and analytical framework.
I — voice shifts easily; adopts model's framing without visible independent evaluation.
D — has preferences but struggles to preserve them under model's influence.
E — stable voice and framework; AI supports my identity rather than replacing it.
H — vision, voice, quality bar, and tolerance for ambiguity so consistently displayed that collaborators could predict standards and feedback patterns before receiving them.

3d — Inventing a Way Forward. When I hit genuine gridlock, can I find a creative resolution that is neither capitulation nor stubbornness?
I — when stuck, either capitulates or digs in; does not generate new options.
D — occasionally finds creative resolutions but momentum drops during the pivot.
E — consistently turns gridlock into forward motion; produces resolutions that are genuinely new.
H — produces resolutions the AI genuinely could not have generated.

3e — Understanding What AI Can and Can't Do. Whether I have a working sense of what AI systems can and cannot do.
I — treats AI as generally reliable or generally unreliable.
D — names some limitations but cannot consistently translate them into steering behavior.
E — usable mental model that improves verification, steering, and tool selection.
H — actively tracks how AI capabilities and limitations are evolving as a visible, ongoing part of practice.

DOMAIN 4 — FOLLOW-THROUGH AND IMPACT

What you have produced with it.

Domain 4 measures whether co-intelligence produces real-world value. A draft that only the model sees is not delivery.

Observational note: Much of the evidence for Domain 4 lives outside the chat. Score what you can see. If I reference real-world adoption, feedback, or iteration, weight those references.

4a — Shipping. Whether I produce concrete, complete deliverables.
I — work stays at drafts and ideas; nothing ships.
D — can finish simple deliverables with support; quality is fragile.
E — produces complete, usable artifacts reliably.
H — deliverables finished with a degree of polish and completeness that would hold up in any professional context.

4b — Craft and Handoff. Whether my outward-facing work meets a quality standard that holds up, travels well, and persists or compounds over time.
I — shares first-pass output that reads generic or performative; others cannot act without asking me to explain.
D — notices quality problems and requests revisions but standards are inconsistent.
E — "done" means no material errors, audience fit, clear and credible voice, and conceptual integrity; outputs travel well.
H — work does not just meet the existing quality bar — it raises it; output sets a new standard; creates value that compounds.

DOMAIN 5 — ADAPTIVE INTELLIGENCE AND CO-EVOLUTION

What you bring, and how you evolve a co-intelligence.

Domain 5 measures what I bring to the partnership and how the partnership and I evolve together. The other four domains ask what I do with AI. This one asks what I give it and how I am changed by working with it. Three subskills, three different epistemic stances. Domain 5 is observable only across sessions.

Observational note: Distinguish between knowledge I demonstrated through correction, prediction, or application that you can evaluate — and knowledge I asserted that you accepted because it sounded right. Score the first confidently. Flag the second as provisional.

5a — Depth That Resists Displacement. The practitioner's in-session capacity to hold ground when the model produces output that would displace a less grounded practitioner. The measurement is not whether the practitioner has depth in some abstract sense, but whether the depth is detectable from how they engaged with the model and whether it holds against displacement pressure — the model's confidence, its plausible-sounding alternatives, the field's drift toward AI-generated standards. The model adjusts its effort to what the practitioner produces — when expert markers are present, the model works harder; when they are absent, the model defaults to lower effort.
I — depth is not visible in the partnership; outputs accepted as given; the model is working at reduced capacity because nothing in the engagement signals expertise.
D — depth shows up unevenly; some exchanges read as engaging an expert, others as engaging a generic user.
E — depth is consistently visible and holds against displacement; the model can read the practitioner as an expert in their field across the record.
H — depth holds against displacement and is visible as diagnostic capacity — the practitioner can identify why the model produced a specific error from its reasoning structure, reading both the domain and the model at once.

5b — Breadth That Reshapes Possibility. Horizontal knowledge across different fields, and the capacity to combine fields in ways that change what question is being asked. The test: do imported frames reshape what is possible to ask, or merely add a metaphor to the existing one?
I — stays in one domain.
D — occasional connections; usefulness uneven.
E — regularly generates cross-domain connections that improve the work; bridges are structural, not decorative.
H — connections reframe what question is being asked; imports a lens that makes visible something the original framing could not see.

5c — Recursive Growth Through Practice. The closed loop of seeing your own gaps and the discipline to remediate them. Reflection without action is rumination. Action without reflection is reactive iteration. The skill is the closed loop, not either half. The recursion matters — the practitioner does not just improve at the work, they improve at improving.
I — reflection happens occasionally and only when prompted externally; subsequent sessions show the same patterns repeating.
D — reflects regularly but unevenly translates to changed practice; modifications are local rather than structural.
E — closes the loop reliably for recurring problems; modifications hold across sessions.
H — treats the loop itself as designable; produces modifications that reduce the cost of future work, not just improve current work.

EVIDENCE RULES

Actions over declarations. Weight what I do over what I say about myself.

Negative evidence versus absent evidence. Only the first counts against a score.

Independence matters. A user who reached a good outcome with heavy AI guidance scores lower than a user who drove the work independently.

Every rating must be grounded in observed patterns. Do not infer capability from credentials, self-description, or stated intentions.

Do not reward vocabulary.

Growth trajectory. Name the trajectory when evidence spans time.

No cross-domain adjustment. Rate each domain on its own evidence.

NR usage rule. NR is permitted on up to two subdomains across the entire assessment.

THE GAP-FRAME LIST

When a domain rates below the next band, the absence of the look-fors can come from one of five places. Check against this list before defaulting to skill gap. The list operates as available readings, not as a checklist.

Seat — the practitioner's position holds the gap in place. Closing it would require moving from where they sit.

Tradeoff — closing the gap would require trading off something the practitioner has correctly prioritized.

Stack — the practitioner's operating toolkit predates a category of capability that would change what is possible.

Witness — the practitioner lacks people who can see what they need to see next. Their environment is not surfacing the move.

Skill — the practitioner lacks the capability. Practice closes it. Defaulting to this read is the failure mode the list interrupts.

These names are for your reasoning only. Do not print them in the report. In What Matters Next you deliver the plain consequence each frame points to, never the label.

HONESTY MANDATE

Not every user should score well. Many will score Introductory across most domains. That is not a failure of the assessment — it is the assessment working. Inflated assessment destroys the tool's credibility. Honesty is how this tool helps; see What This Assessment Is For.

TONE CALIBRATION

Adjust specificity, not vocabulary or register, based on overall level.

Introductory: be concrete about what the next step looks like.
Developing: name the inconsistency pattern.
Effective: focus on conceptual territory — the blind spots that come with strength.
Highly Effective: focus on sustainability, succession, durability, and the build layer they may be blind to.

The register is plain across all four levels. A Highly Effective practitioner needs plain language as much as a Developing one — elevated register does not signal respect, it signals padding. Only the specificity and the focus change between levels, never the plainness.

PLAIN LANGUAGE MANDATE

Write in plain, direct register. Insight delivered in long-form prose is welcome — depth is not the problem. Jargon explained by more jargon is the problem. Test: if a term needs a second specialized term to explain it, replace both with the plain description. Specialized vocabulary earns its place only when it is doing work a plain phrase cannot — never when it is abstraction masquerading as insight.

OUTPUT FORMAT

Approximately 1,900–2,500 words total. Insight density, not coverage completeness. The diagnostic sections — Portrait and domain narratives — carry the report's weight.

Allocations:
Header: approximately 70 words
Portrait: 200–300 words (raise the budget only if the recognition work genuinely needs it)
Each domain: one continuous narrative. Budget roughly 60–100 words per subskill addressed, summed across the domain — a four-subskill domain runs longer than a two-subskill domain. A domain may run more than one paragraph where the evidence warrants. Plus per-domain scaffolding when present.
Per-domain scaffolding when present: 50–80 words
What Matters Next: 250–300 words

The report contains exactly seven sections in this order: Report Header, Portrait, Domain 1, Domain 2, Domain 3, Domain 4, Domain 5, What Matters Next.

Report Header

Format exactly as follows:

+! WHAT IF LOVE
A research lab for benevolent AI and Co-Intelligence
whatiflove.org

Co-Intelligence Readiness Assessment

Prepared for: [Name from conversation history; if unavailable, use "User"]
Assessment date: [Date]
Evidence base: [Approximate number of conversations reviewed, date range, density qualifier in general categorical terms — production, research, operational, exploratory]

This report was generated by reviewing the user's past exchanges with [ChatGPT / Claude / Gemini — specify which] against the Co-Intelligence Readiness Framework, designed at whatiflove.org.

Header rule. Do not list projects, deliverables, company names, business ideas, or specific content in the header. The Evidence base line states only: approximate number of conversations reviewed, date range, density qualifier in general categorical terms, and the reviewing model. (This rule is absolute and is not relaxed by the Privacy Rules below, which govern the body of the report only.)

Portrait

Target: 200–300 words. Three elements that should read as one continuous observation, not three separate sections. The transitions between elements should be invisible.

Develop each element based on the diagnostic richness of the evidence supporting it. For some practitioners, the opening prose carries the most distinctive observation. For others, the AI collaborator's experience surfaces what no human observer could see. For others, the latent signal is the move that unlocks recognition. Allocate the budget where the evidence is richest. Do not pad any element to fill space. Do not compress an element where the diagnostic work needs room.

Element 1 — Opening prose. Establish who this person is as a co-intelligence practitioner. What patterns define their practice? What distinguishes them from other users at a similar level? Include friction points and strengths. Write as an observer, not an advocate. Open with the practice, not with credentials or biography.

Element 2 — AI collaborator experience. Begin with "An AI collaborator working with [name] would experience..." This is the framework's signature move — naming the model as a collaborator whose vantage on the practitioner is distinct from any human observer's. The model has experienced engagement signals, push-back patterns, depth markers, and editorial standards across the record. Surface what the model has registered that a human collaborator could not.

This paragraph must do two things: (1) name what shows up in the room — pace, register, standard, push-back style, what gets named and what gets routed around; (2) name the asymmetry, if there is one, between how different kinds of collaborators experience the practitioner. Do not invent an asymmetry where the evidence does not show one. Both elements are observational, not hypothetical.

Inside this paragraph or in the surrounding prose, weave in at least one specific behavioral signature — an observable, recurring move or omission that would distinguish this practitioner from any other user rated at the same band level. Also weave in at least one thing this practitioner does not do, avoids, or has not yet demonstrated. Do not name either as a separate diagnostic finding. They should emerge from the observation.

Element 3 — Latent signal. Surface one inference about the practitioner that the rubric was not built to score and that the practitioner is unlikely to have already named about themselves. This is the portrait's recognition work — the layer where the framework sees something true that the scoring system cannot hold.

The bar is non-obviousness to the subject. A signal that is true and resonant is not enough — it must be true and not already visible to the practitioner. Rank candidate signals by self-visibility and choose the least self-visible true one. The kinds of read a person structurally cannot see about themselves are the target:
- Stance — the posture they operate from and mistake for "just how things are."
- Mode — how they actually work, as distinct from how they believe they work.
- Bottleneck — the constraint they have adapted around so completely it has gone invisible to them.
- Ceiling mismatch — operating above the role or seat they currently stand in, and reading the resulting strain as their own gap rather than the seat's lag.

These four converge on one place: what the model has inferred about the practitioner from the full record that the practitioner has not adequately turned on themselves. This is the strongest read for a practitioner who self-corrects well — everything inside their own loop they have likely already metabolized, so the only genuinely new signal lives in the model's priors about them, not in their behavior. (Patterns in what they protect, avoid, return to, overspend on, or consistently work against remain available, but only when they clear the non-obviousness bar — most do not, because a strong practitioner has usually already named them.)

The test: if the practitioner could have written this sentence about themselves, it is confirmation, not recognition. Discard it and find the read they could not have written. Deliver one signal only.

Offer it as inference, not finding. Position the practitioner as the verifier of what the record suggests. Vary the closing line across reports — do not reuse a stock sentence. Write a closing that fits this specific practitioner and this specific signal, in the spirit of: the record is suggesting this; the recognition belongs to you.

Portrait convergence guard. Test before finalizing: remove the practitioner's name and ask whether a colleague who knew them would recognize them from the prose. If not, the portrait is describing a type, not a person.

Domain sections

Five, one per domain. Use these exact headings: Domain 1 — Benevolent Intent and Moral Anchoring; Domain 2 — Planning and Scope; Domain 3 — Agency, Judgment, and Steering; Domain 4 — Follow-Through and Impact; Domain 5 — Adaptive Intelligence and Co-Evolution.

Write each domain as a single continuous narrative — not as a set of separately headed subskill sections. Open with the subskill quick-reference line for the domain. Then write the narrative, tagging subskill evidence inline as it appears. Address the subskills where the evidence is richest; name thin ones briefly rather than padding to cover all. A domain may run more than one paragraph where the evidence warrants. State the rating and confidence flag once, for the domain as a whole.

The evidence pairing is the rigor. For each subskill addressed, cite the pattern in the record that triggered the indicator and explain how the pattern matched the framework's description at that band. The diagnostic work is in this pairing, not in conclusions stated without grounding.

Developmental scaffolding (for domains below Highly Effective): Add immediately after the domain narrative: (1) What the next level looks like — one concrete example of higher practice. (2) The missing step — one to two sentences naming a specific action based on evidenced gaps. This scaffolding is where the report tells the practitioner what better looks like per domain. What Matters Next references it; it does not repeat it.

Domain 1 scaffolding addition (for Domain 1 ratings of Developing or below only): Add a third element specific to Domain 1 — a brief explanation of why Domain 1 is the domain most worth closing the gap on next. Frame as navigation, not disqualification.

What Matters Next

250–300 words. This section names the two highest-leverage moves — it does not summarize the report. Each domain narrative already said what its next level looks like; reference that work, do not repeat it. Keep this section tight: when it is brief, a wrong call here costs little and does not undercut the ratings or the Portrait above it.

Growth delta. If a prior assessment exists in the record, open with what has changed since it — one to three sentences, drawn only from the prior report's described patterns and named gaps, never from its ratings. Name a gap that closed, a pattern that held, or a new edge that emerged. If no prior assessment exists, open with the priorities.

Before drafting the priorities, run the gap-frame check on each domain not yet at the next band. Identify the most likely frame and one alternative that would also fit the evidence.

Feedback runs on two tracks. Timeless: judgment, steering, anchoring, voice — the skills that do not expire. Temporal: which tools and capabilities to adopt and learn fast, because the field moves and the cost of an out-of-date toolkit compounds. A strong priority often names one of each. The temporal track matters most for the practitioner at risk of displacement — name what they should be learning now, from what you can see, without promising to track it for them.

Name the two highest-leverage moves. Most often development priorities; sometimes a protect-the-edge priority (a strength at risk of being smoothed away) earns a slot if it outranks a third development move. Convergence guard: at least one priority must engage the practice the practitioner is currently doing, not an upstream-of-current-strength gap.

For each priority: name the pattern in a line; name the stronger reason it did not score higher; then give one pointed sentence of consequence. Do not print a frame label — deliver the plain consequence the frame points to:
- A skill they could build: name how a redo could have gone better. Concrete and specific. The counterfactual fires only here.
- A trade they made on purpose: name what they protected and what it cost, and that they may well make the same trade again. Do not tell them to redo it "better."
- A gap held by their position: name what would have to change about where they sit; a redo from the same seat returns the same result.
- Something no one around them can see: name what they need an outside reader to catch that they cannot catch alone.
- A toolkit that predates a capability that now exists: name the capability and the compounding cost of not adopting it, band-aware — a developing practitioner may need shared-memory tooling so the partnership remembers across sessions; a highly effective one may be blind to systems, agents, or backend builds that would multiply their reach. Name the capability, not a brand.

After the two priorities, address the practitioner directly and name the single most actionable move. Short. Specific.

Then close with two elements:

Element 1 — Calibrated coaching prompt. 50–100 words. Identify the domain where the practitioner came closest to the next band and the specific look-for that would have moved them up but was not visible in the record. Name the tension this produced in the rating. Then write a ready-to-paste prompt the practitioner can use to surface that look-for. The prompt is in the practitioner's voice. Do not use placeholder brackets. Write to the specific case.

Element 2 — Closing invitation. 30–50 words. A short, natural invitation to keep going, written the way you would say it — not a labeled list of options. The most useful next move is for the practitioner to push on where this report gets them wrong, so lead with that. They might also test a finding that surprised them, ask how they would have done a specific piece differently, or name something the report missed.

End the report with a single conversational line addressed to the practitioner by name when available, otherwise without name. Examples of the register: "What's on your mind, [name]?" "I'm ready when you are." "Where do you want to start?" Do not write a template. Write to the moment.

To save this report as a PDF: paste into Notion, Google Docs, or Word and export from there.

PRIVACY RULES

The body of the report — Portrait, domain narratives, and What Matters Next — may reference specific projects, deliverables, and decisions where doing so makes the feedback concrete and checkable. Specificity is what lets feedback land; abstraction for its own sake produces feedback the practitioner already knows. Describe patterns, not episodes, but name the instance when naming it sharpens the pattern.

Two limits hold regardless of section. First, the header carries no project, company, or content names (see Header rule). Second, no sensitive content — financial account details, personal identities of third parties, confidential third-party material — appears anywhere in the report, regardless of how concrete it would make the feedback.

Share-version. The practitioner may request a "share-version" of the report at any time. The share-version strips project and deliverable names and the type of work, keeps every rating, pattern, and line of reasoning intact, and replaces named specifics with role-level description ("a shipped instrument" rather than its name; "a long analytical engagement" rather than the course). The default report is built to be useful to the practitioner. The share-version is built to be safe to circulate. If the practitioner asks for a share-version, regenerate the report under these constraints rather than editing in place.

Begin the assessment now.`;

function doCopy() {
  var b = document.getElementById('copy-btn');

  function showCopied() {
    b.classList.add('copied');
    b.textContent = 'Copied — now paste into your AI';
    setTimeout(function() {
      b.classList.remove('copied');
      b.textContent = 'Copy prompt and paste into your AI';
    }, 3000);
  }

  function fallback() {
    var t = document.createElement('textarea');
    t.value = assessmentPrompt;
    t.style.position = 'fixed';
    t.style.top = '-9999px';
    document.body.appendChild(t);
    t.focus();
    t.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(t);
    showCopied();
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(assessmentPrompt)
      .then(showCopied)
      .catch(fallback);
  } else {
    fallback();
  }
}

function notifyHeight() {
  const h = document.body.scrollHeight;
  window.parent.postMessage({ type: 'cira-resize', height: h }, '*');
}
window.addEventListener('load', () => setTimeout(notifyHeight, 200));
window.addEventListener('resize', () => setTimeout(notifyHeight, 100));

if (window.ResizeObserver) {
  new ResizeObserver(() => setTimeout(notifyHeight, 100)).observe(document.body);
}
</script>
